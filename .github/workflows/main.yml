name: Maven CI/CD
on:
    push:
      branches: [ main ]
    pull_request:
      branches: [ main ]
jobs:
    build:
      runs-on: ubuntu-latest
      steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'
          cache: maven
      - name: Build with Maven
        run: mvn clean compile
    test:
      runs-on: ubuntu-latest
      needs: build
      steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'
          cache: maven
      - name: Run tests
        run: mvn test
      - name: Relatorio de testes
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: relatorio-junit
          path: target/surefire-reports/
    deploy:
      runs-on: ubuntu-latest
      needs: test
      if: github.ref == 'refs/heads/main'
      steps:
      - uses: actions/checkout@v3
      - name: Set up JDK 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'adopt'
          cache: maven
      - name: Package JAR
        run: mvn clean package -DskipTests
      - name: Deploy simulado
        run: echo "deploy feito"
